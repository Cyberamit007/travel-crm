name: 🚀 Deploy to EC2

# Runs automatically on every push to master.
# SSMs into EC2, pulls latest code, rebuilds, restarts containers.
on:
  push:
    branches: [master]

jobs:
  deploy:
    name: Redeploy on EC2
    runs-on: ubuntu-latest

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Get EC2 instance ID from CloudFormation
        id: get-instance
        run: |
          INSTANCE_ID=$(aws cloudformation describe-stacks \
            --stack-name travel-crm \
            --query 'Stacks[0].Outputs[?OutputKey==`InstanceId`].OutputValue' \
            --output text)
          PUBLIC_IP=$(aws cloudformation describe-stacks \
            --stack-name travel-crm \
            --query 'Stacks[0].Outputs[?OutputKey==`PublicIP`].OutputValue' \
            --output text)
          echo "instance_id=$INSTANCE_ID" >> $GITHUB_OUTPUT
          echo "public_ip=$PUBLIC_IP"     >> $GITHUB_OUTPUT
          echo "Deploying to instance: $INSTANCE_ID ($PUBLIC_IP)"

      - name: Trigger redeploy via SSM
        id: ssm
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "${{ steps.get-instance.outputs.instance_id }}" \
            --document-name "AWS-RunShellScript" \
            --parameters '{"commands":["/home/ec2-user/travel-crm/scripts/redeploy.sh"]}' \
            --timeout-seconds 3600 \
            --query 'Command.CommandId' \
            --output text)
          echo "command_id=$COMMAND_ID" >> $GITHUB_OUTPUT
          echo "SSM command ID: $COMMAND_ID"

      - name: Wait for redeploy to finish
        run: |
          INSTANCE_ID=${{ steps.get-instance.outputs.instance_id }}
          COMMAND_ID=${{ steps.ssm.outputs.command_id }}
          echo "Polling SSM command status..."

          for i in $(seq 1 60); do
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "$INSTANCE_ID" \
              --query Status --output text 2>/dev/null || echo "Pending")

            echo "[$i/60] Status: $STATUS"

            case "$STATUS" in
              Success)
                echo "Deployment succeeded!"
                break
                ;;
              Failed|Cancelled|TimedOut)
                echo "Deployment failed. Getting logs..."
                aws ssm get-command-invocation \
                  --command-id "$COMMAND_ID" \
                  --instance-id "$INSTANCE_ID" \
                  --query '[StandardOutputContent, StandardErrorContent]' \
                  --output text
                exit 1
                ;;
              *)
                sleep 30
                ;;
            esac
          done

      - name: Print app URL
        run: |
          echo ""
          echo "======================================"
          echo "  Deployed: http://${{ steps.get-instance.outputs.public_ip }}"
          echo "======================================"
