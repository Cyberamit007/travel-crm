name: 🚀 Deploy to EC2

# Runs on every push to master.
# First push: auto-creates EC2 via CloudFormation and waits for full bootstrap.
# Subsequent pushes: SSMs into EC2, pulls latest code, rebuilds, restarts containers.
on:
  push:
    branches: [master]

jobs:
  deploy:
    name: Provision + Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      # ── Check if this is a first-time deploy ────────────────────────────────
      - name: Check stack state
        id: check
        run: |
          STATUS=$(aws cloudformation describe-stacks \
            --stack-name travel-crm \
            --query 'Stacks[0].StackStatus' \
            --output text 2>/dev/null || echo "DOES_NOT_EXIST")

          echo "Stack status: $STATUS"

          # Clean up stacks that are stuck in a bad terminal state
          if [ "$STATUS" = "ROLLBACK_COMPLETE" ] || [ "$STATUS" = "DELETE_COMPLETE" ]; then
            echo "Stack in bad state ($STATUS) — deleting and re-creating..."
            aws cloudformation delete-stack --stack-name travel-crm
            aws cloudformation wait stack-delete-complete --stack-name travel-crm
            STATUS="DOES_NOT_EXIST"
          fi

          if [ "$STATUS" = "DOES_NOT_EXIST" ]; then
            echo "fresh=true" >> $GITHUB_OUTPUT
          else
            echo "fresh=false" >> $GITHUB_OUTPUT
          fi

      # ── First time: create EC2 via CloudFormation ───────────────────────────
      - name: Provision infrastructure (first deploy only)
        if: steps.check.outputs.fresh == 'true'
        run: |
          echo "No stack found — creating EC2 infrastructure..."
          aws cloudformation deploy \
            --template-file cloudformation.yml \
            --stack-name travel-crm \
            --capabilities CAPABILITY_NAMED_IAM \
            --no-fail-on-empty-changeset \
            --parameter-overrides \
              DBPassword="${{ secrets.DB_PASSWORD }}"
          echo "CloudFormation stack created."

      # ── Always: get instance ID + IP from stack outputs ─────────────────────
      - name: Get stack outputs
        id: stack
        run: |
          INSTANCE_ID=$(aws cloudformation describe-stacks \
            --stack-name travel-crm \
            --query 'Stacks[0].Outputs[?OutputKey==`InstanceId`].OutputValue' \
            --output text)
          PUBLIC_IP=$(aws cloudformation describe-stacks \
            --stack-name travel-crm \
            --query 'Stacks[0].Outputs[?OutputKey==`PublicIP`].OutputValue' \
            --output text)
          echo "instance_id=$INSTANCE_ID" >> $GITHUB_OUTPUT
          echo "public_ip=$PUBLIC_IP"     >> $GITHUB_OUTPUT
          echo "Instance: $INSTANCE_ID | IP: $PUBLIC_IP"

      - name: Wait for EC2 health checks
        run: |
          echo "Waiting for EC2 to pass status checks..."
          aws ec2 wait instance-status-ok \
            --instance-ids ${{ steps.stack.outputs.instance_id }}
          echo "EC2 is healthy."

      # ── First time: wait for full app bootstrap (docker build, DB seed, etc.) ─
      - name: Wait for bootstrap to complete (first deploy only, up to 25 min)
        if: steps.check.outputs.fresh == 'true'
        run: |
          INSTANCE_ID=${{ steps.stack.outputs.instance_id }}
          echo "New instance — waiting for app bootstrap to finish..."
          echo "This installs Docker, builds the app, runs DB seed — takes ~15-20 min."

          # Give SSM agent a moment to start
          sleep 30

          for i in $(seq 1 50); do
            CMD_ID=$(aws ssm send-command \
              --instance-ids "$INSTANCE_ID" \
              --document-name "AWS-RunShellScript" \
              --parameters '{"commands":["test -f /home/ec2-user/.userdata-complete && echo DONE || echo PENDING"]}' \
              --query 'Command.CommandId' --output text 2>/dev/null || echo "")

            if [ -z "$CMD_ID" ]; then
              echo "Check $i/50: SSM not ready yet — retrying..."
              sleep 30
              continue
            fi

            sleep 5
            RESULT=$(aws ssm get-command-invocation \
              --command-id "$CMD_ID" \
              --instance-id "$INSTANCE_ID" \
              --query 'StandardOutputContent' --output text 2>/dev/null || echo "PENDING")

            echo "Check $i/50: $RESULT"

            if echo "$RESULT" | grep -q "DONE"; then
              echo "Bootstrap complete!"
              break
            fi

            if [ "$i" -eq 50 ]; then
              echo "Bootstrap timed out after 25 minutes."
              exit 1
            fi

            sleep 25
          done

      # ── Subsequent deploys: pull + rebuild via SSM ───────────────────────────
      - name: Trigger redeploy via SSM (subsequent deploys only)
        id: ssm
        if: steps.check.outputs.fresh == 'false'
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "${{ steps.stack.outputs.instance_id }}" \
            --document-name "AWS-RunShellScript" \
            --parameters '{"commands":["/home/ec2-user/travel-crm/scripts/redeploy.sh"]}' \
            --timeout-seconds 3600 \
            --query 'Command.CommandId' \
            --output text)
          echo "command_id=$COMMAND_ID" >> $GITHUB_OUTPUT
          echo "SSM command ID: $COMMAND_ID"

      - name: Wait for redeploy to finish
        if: steps.check.outputs.fresh == 'false'
        run: |
          INSTANCE_ID=${{ steps.stack.outputs.instance_id }}
          COMMAND_ID=${{ steps.ssm.outputs.command_id }}
          echo "Polling SSM redeploy status..."

          for i in $(seq 1 60); do
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "$INSTANCE_ID" \
              --query Status --output text 2>/dev/null || echo "Pending")

            echo "[$i/60] Status: $STATUS"

            case "$STATUS" in
              Success)
                echo "Redeploy succeeded!"
                break
                ;;
              Failed|Cancelled|TimedOut)
                echo "Redeploy failed — fetching logs..."
                aws ssm get-command-invocation \
                  --command-id "$COMMAND_ID" \
                  --instance-id "$INSTANCE_ID" \
                  --query '[StandardOutputContent, StandardErrorContent]' \
                  --output text
                exit 1
                ;;
              *)
                sleep 30
                ;;
            esac
          done

      - name: App is live
        run: |
          echo ""
          echo "======================================"
          echo "  App is live at:"
          echo "  http://${{ steps.stack.outputs.public_ip }}"
          echo ""
          echo "  Admin login:"
          echo "  Email:    admin@travelcrm.com"
          echo "  Password: admin123"
          echo "======================================"
