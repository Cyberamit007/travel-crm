name: 🏗️ Provision Infrastructure

# Run manually the FIRST TIME to create EC2 on AWS.
# Do NOT run this repeatedly — it creates/replaces the server.
on:
  workflow_dispatch:

jobs:
  provision:
    name: Deploy CloudFormation Stack
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Deploy CloudFormation stack
        run: |
          aws cloudformation deploy \
            --template-file cloudformation.yml \
            --stack-name travel-crm \
            --capabilities CAPABILITY_NAMED_IAM \
            --no-fail-on-empty-changeset \
            --parameter-overrides \
              DBPassword="${{ secrets.DB_PASSWORD }}" \
              EmailUser="${{ secrets.EMAIL_USER }}" \
              EmailPass="${{ secrets.EMAIL_PASS }}"

      - name: Get stack outputs
        id: outputs
        run: |
          INSTANCE_ID=$(aws cloudformation describe-stacks \
            --stack-name travel-crm \
            --query 'Stacks[0].Outputs[?OutputKey==`InstanceId`].OutputValue' \
            --output text)
          PUBLIC_IP=$(aws cloudformation describe-stacks \
            --stack-name travel-crm \
            --query 'Stacks[0].Outputs[?OutputKey==`PublicIP`].OutputValue' \
            --output text)
          echo "instance_id=$INSTANCE_ID" >> $GITHUB_OUTPUT
          echo "public_ip=$PUBLIC_IP"     >> $GITHUB_OUTPUT

      - name: Wait for EC2 to pass health checks
        run: |
          echo "Waiting for EC2 instance to pass status checks..."
          aws ec2 wait instance-status-ok \
            --instance-ids ${{ steps.outputs.outputs.instance_id }}
          echo "EC2 is up."

      - name: Wait for app bootstrap to finish (up to 25 min)
        run: |
          INSTANCE_ID=${{ steps.outputs.outputs.instance_id }}
          echo "Polling for bootstrap completion marker..."
          for i in $(seq 1 50); do
            STATUS=$(aws ssm send-command \
              --instance-ids "$INSTANCE_ID" \
              --document-name "AWS-RunShellScript" \
              --parameters '{"commands":["test -f /home/ec2-user/.userdata-complete && echo DONE || echo PENDING"]}' \
              --query 'Command.CommandId' --output text)
            sleep 5
            RESULT=$(aws ssm get-command-invocation \
              --command-id "$STATUS" \
              --instance-id "$INSTANCE_ID" \
              --query 'StandardOutputContent' --output text 2>/dev/null || echo "PENDING")
            echo "Check $i/50: $RESULT"
            if echo "$RESULT" | grep -q "DONE"; then
              echo "Bootstrap complete!"
              break
            fi
            sleep 25
          done

      - name: Print app URL
        run: |
          echo ""
          echo "======================================"
          echo "  App is live at:"
          echo "  http://${{ steps.outputs.outputs.public_ip }}"
          echo ""
          echo "  Admin login:"
          echo "  Email:    admin@travelcrm.com"
          echo "  Password: admin123"
          echo "======================================"
